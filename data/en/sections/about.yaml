# a summary about you
summary: |
  If something's boring, slow, or easy to get wrong by hand, I'll find a way to automate it — that's the part of the job I enjoy the most.

  I also like to speak at conferences to share what I've learned (and what blew up along the way) with the community.

  I have a [technical blog](https://blog.danielssilva.dev/) where I write about DevOps, Azure, PowerShell and whatever homelab project I'm currently breaking.

  Based in Portugal 🇵🇹 — EU citizen, full remote preferred.

